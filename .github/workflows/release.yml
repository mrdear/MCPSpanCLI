name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            label: macos-x86_64
            archive_name: mcp-span-cli-macos-x86_64.zip
          - runner: macos-14
            label: macos-arm64
            archive_name: mcp-span-cli-macos-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release binary
        run: swift build -c release

      - name: Package archive
        run: |
          BIN_DIR="$(swift build -c release --show-bin-path)"
          mkdir -p dist
          cp "$BIN_DIR/MCPSpanCLI" "dist/mcp-span-cli"
          chmod +x "dist/mcp-span-cli"
          ditto -c -k --sequesterRsrc --keepParent dist "${{ matrix.archive_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
          generate_release_notes: true
